name: Apply SUSFS v2.2.0
description: Apply the pinned upstream SUSFS v2.2.0 patch stack for a supported GKI target.

inputs:
  android_version:
    description: Android generation, for example android14
    required: true
  kernel_version:
    description: Kernel version, for example 6.1
    required: true
  sub_level:
    description: GKI sublevel
    required: true
  os_patch_level:
    description: Android security patch level (YYYY-MM)
    required: true

runs:
  using: composite
  steps:
    - name: Apply pinned SUSFS v2.2.0
      shell: bash
      run: |
        set -euo pipefail

        TARGET="${{ inputs.android_version }}-${{ inputs.kernel_version }}"
        SUBLEVEL="${{ inputs.sub_level }}"
        OS_PATCH_LEVEL="${{ inputs.os_patch_level }}"
        case "$TARGET" in
          android12-5.10) SUSFS_COMMIT="8c6faae6881c2eb8174842b9b00a9e85b9cfa47f" ;;
          android13-5.10) SUSFS_COMMIT="8de71447d9d53fdb317d890181f13d35ef738a49" ;;
          android13-5.15) SUSFS_COMMIT="9f0415bb2c8fc581e93d384e09aba088bd36733a" ;;
          android14-5.15) SUSFS_COMMIT="841412d1f3eae63605979099714e6cf3866457de" ;;
          android14-6.1)  SUSFS_COMMIT="8199bb6534174117ad907f726231484872ac345a" ;;
          android15-6.6)  SUSFS_COMMIT="a652208b593826f39534d6a881818a7ae0c4dc5d" ;;
          android16-6.12) SUSFS_COMMIT="5857c396b50da6b70a4e04b2994012ab961457a2" ;;
          *)
            echo "::error::SUSFS v2.2.0 does not support $TARGET"
            exit 1
            ;;
        esac

        KERNEL_COMMON="${KERNEL_ROOT:?KERNEL_ROOT is not set}/common"
        SUSFS_DIR="$RUNNER_TEMP/susfs4ksu-$TARGET"
        trap 'rm -rf "$SUSFS_DIR"' EXIT

        git clone --branch "gki-$TARGET" \
          https://gitlab.com/simonpunk/susfs4ksu.git "$SUSFS_DIR"
        git -C "$SUSFS_DIR" checkout --detach "$SUSFS_COMMIT"

        # The two compatibility commits are part of the tested v2.2.0 GKI stack.
        git -C "$SUSFS_DIR" remote add pershoot https://gitlab.com/pershoot/susfs4ksu.git
        git -C "$SUSFS_DIR" fetch pershoot gki-android14-6.1-dev
        git -C "$SUSFS_DIR" cherry-pick 8d2420be13e43d4cc0d80215d08ed475081a1404
        git -C "$SUSFS_DIR" cherry-pick ee71ca33d08710d686f2bdba27cacefe9e615fb9

        cd "$KERNEL_COMMON"
        cp "$SUSFS_DIR/kernel_patches/fs/"* fs/
        cp "$SUSFS_DIR/kernel_patches/include/linux/"* include/linux/
        PATCH_FILE="$SUSFS_DIR/kernel_patches/50_add_susfs_in_gki-$TARGET.patch"
        test -s "$PATCH_FILE"

        prepare_fdinfo() {
          sed -i '/^[[:space:]]*\/\*$/,/^[[:space:]]*u32 mask = mark->mask & IN_ALL_EVENTS;$/d' fs/notify/fdinfo.c
          perl -i -pe 's/\bmask,\s*mark->ignored_mask/inotify_mark_user_mask(mark)/g' fs/notify/fdinfo.c
          perl -i -pe 's/ignored_mask:%x/ignored_mask:0/g' fs/notify/fdinfo.c
        }

        restore_fdinfo() {
          perl -i -pe 's/^(\s+if \(inode\) \{)/$1\n\t\t\/\*\n\t\t * IN_ALL_EVENTS represents all of the mask bits\n\t\t * that we expose to userspace.  There is at\n\t\t * least one bit (FS_EVENT_ON_CHILD) which is\n\t\t * used only internally to the kernel.\n\t\t *\/\n\t\tu32 mask = mark->mask \& IN_ALL_EVENTS;/m' fs/notify/fdinfo.c
          perl -i -pe 's/\binotify_mark_user_mask\(mark\)/mask, mark->ignored_mask/g' fs/notify/fdinfo.c
          perl -i -pe 's/ignored_mask:0/ignored_mask:%x/g' fs/notify/fdinfo.c
        }

        case "$TARGET" in
          android12-5.10)
            if [ "$SUBLEVEL" -le 43 ]; then
              perl -i -pe 's/(int|size_t)\s+this_len\s*=\s*min_t\s*\(\s*\1\s*,/size_t this_len = min_t(size_t,/' fs/proc/base.c
            fi
            [ "$SUBLEVEL" -le 117 ] && prepare_fdinfo
            ;;
          android13-5.10)
            [ "$SUBLEVEL" -le 107 ] && prepare_fdinfo
            ;;
          android13-5.15)
            if [ "$SUBLEVEL" -le 41 ]; then
              sed -i '/^#include <linux\/shmem_fs.h>$/a #include <linux/mnt_idmapping.h>' fs/namespace.c
              sed -i '/^#include <linux\/compat.h>$/a #include <linux/mnt_idmapping.h>' fs/open.c
              prepare_fdinfo
            fi
            if [ "$SUBLEVEL" -ge 197 ]; then
              sed -i '/^#include <trace\/hooks\/blk.h>$/d' fs/namespace.c
              sed -i '/^#include <trace\/hooks\/mm.h>$/d' fs/proc/task_mmu.c
            fi
            ;;
          android14-6.1)
            [ "$SUBLEVEL" -le 25 ] && sed -i '/^#include <trace\/events\/oom.h>$/a #include <trace/hooks/sched.h>' fs/proc/base.c
            [ "$SUBLEVEL" -le 141 ] && sed -i '/^#include <linux\/cpufreq_times.h>$/a #include <linux/dma-buf.h>' fs/proc/base.c
            [ "$SUBLEVEL" -ge 157 ] && sed -i '/^#include <trace\/hooks\/blk.h>$/d' fs/namespace.c
            ;;
          android15-6.6)
            if [ "$SUBLEVEL" -le 30 ]; then
              sed -i '/smap_gather_stats(vma, &mss, last_vma_end);/a\last_vma_end = vma->vm_end;' fs/proc/task_mmu.c
              perl -0777 -i -pe '
                @l = split /\n/;
                for ($i = $#l; $i >= 0; $i--) {
                    if ($l[$i] =~ /last_vma_end = vma->vm_end;/) {
                        $l[$i] = "\t\t\t\t" . $l[$i];
                        splice(@l, $i + 1, 0, "\t\t\t\t}");
                        for ($j = $i; $j >= 0; $j--) {
                            if ($l[$j] =~ /if\s*\(vma->vm_end > last_vma_end\)/) {
                                $l[$j] =~ s/\)\s*$/) {/;
                                last;
                            }
                        }
                        last;
                    }
                }
                $_ = join "\n", @l
              ' fs/proc/task_mmu.c
            fi
            [ "$SUBLEVEL" -le 92 ] && sed -i '/^#include <linux\/cpufreq_times.h>$/a #include <linux/dma-buf.h>' fs/proc/base.c
            [ "$SUBLEVEL" -le 57 ] && sed -i '/^#include <linux\/sched\/sysctl.h>$/a #include <linux/zswap.h>' mm/memory.c
            ;;
          android16-6.12)
            [ "$SUBLEVEL" -ge 58 ] && sed -i '/^#include <linux\/dma-buf.h>$/d' fs/exec.c
            [ "$SUBLEVEL" -ge 69 ] && sed -i 's/vma_data_pages/vma_pages/g' fs/proc/task_mmu.c
            ;;
        esac

        patch -p1 --no-backup-if-mismatch < "$PATCH_FILE"

        case "$TARGET" in
          android12-5.10)
            [ "$SUBLEVEL" -le 43 ] && sed -i 's/^size_t this_len = min_t(size_t, count, PAGE_SIZE);$/int this_len = min_t(int, count, PAGE_SIZE);/' fs/proc/base.c
            [ "$SUBLEVEL" -le 117 ] && restore_fdinfo
            ;;
          android13-5.10)
            [ "$SUBLEVEL" -le 107 ] && restore_fdinfo
            ;;
          android13-5.15)
            if [ "$SUBLEVEL" -le 41 ]; then
              sed -i '/#include <linux\/mnt_idmapping.h>$/d' fs/namespace.c
              sed -i '/#include <linux\/mnt_idmapping.h>$/d' fs/open.c
              restore_fdinfo
              sed -i 's|i_uid_into_mnt(i_user_ns(&fi->inode), &fi->inode).val|i_uid_into_mnt(\&init_user_ns, \&fi->inode).val|g' fs/susfs.c
              sed -i 's|i_uid_into_mnt(i_user_ns(inode), inode).val|i_uid_into_mnt(\&init_user_ns, inode).val|g' fs/susfs.c
            fi
            [ "$SUBLEVEL" -ge 197 ] && sed -i '/^#include "internal.h"$/a #include <trace/hooks/blk.h>' fs/namespace.c
            [ "$SUBLEVEL" -ge 206 ] && sed -i '/^#include <linux\/pkeys.h>$/a #include <trace/hooks/mm.h>' fs/proc/task_mmu.c
            ;;
          android14-6.1)
            [ "$SUBLEVEL" -le 25 ] && sed -i '/^#include <trace\/hooks\/sched.h>$/d' fs/proc/base.c
            [ "$SUBLEVEL" -le 141 ] && sed -i '/^#include <linux\/dma-buf.h>$/d' fs/proc/base.c
            [ "$SUBLEVEL" -ge 157 ] && sed -i '/^#include "internal.h"$/a #include <trace/hooks/blk.h>' fs/namespace.c
            ;;
          android15-6.6)
            [ "$SUBLEVEL" -le 92 ] && sed -i '/^#include <linux\/dma-buf.h>$/d' fs/proc/base.c
            [ "$SUBLEVEL" -le 57 ] && sed -i '/^#include <linux\/zswap.h>$/d' mm/memory.c
            ;;
          android16-6.12)
            [ "$SUBLEVEL" -ge 58 ] && sed -i '/^#include /a #include <linux/dma-buf.h>' fs/exec.c
            [ "$SUBLEVEL" -ge 69 ] && sed -i 's/vma_pages/vma_data_pages/g' fs/proc/task_mmu.c
            ;;
        esac

        SHOW_PAD_FIX=0
        if [[ "$TARGET" = "android12-5.10" && "$SUBLEVEL" -le 209 ]]; then
          SHOW_PAD_FIX=1
        elif [[ "$TARGET" = "android13-5.10" && "$SUBLEVEL" -le 209 && "$OS_PATCH_LEVEL" != "2024-05" ]]; then
          SHOW_PAD_FIX=1
        elif [[ "$TARGET" = "android13-5.15" && "$SUBLEVEL" -le 148 && "$OS_PATCH_LEVEL" != "2024-05" ]]; then
          SHOW_PAD_FIX=1
        elif [[ "$TARGET" = "android14-5.15" && "$SUBLEVEL" -le 148 && "$OS_PATCH_LEVEL" != "2024-05" ]]; then
          SHOW_PAD_FIX=1
        elif [[ "$TARGET" = "android14-6.1" && "$SUBLEVEL" -le 75 && "$OS_PATCH_LEVEL" != "2024-05" ]]; then
          SHOW_PAD_FIX=1
        fi
        [ "$SHOW_PAD_FIX" = "1" ] && sed -i 's/goto show_pad;/return 0;/' fs/proc/task_mmu.c
